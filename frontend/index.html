<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FlatShare" />
    <meta name="theme-color" content="#6c63ff" />
    <meta name="description" content="Track grocery and household purchases, split flat rent, generate bills for your flatmates." />
    <meta name="keywords" content="flatshare, expense splitting, house sharing, Nepal, rent split" />

    <!-- Open Graph -->
    <meta property="og:title" content="FlatShare — Shared Living, Clear Bills" />
    <meta property="og:description" content="Track expenses, split rent, generate bills for your flat." />
    <meta property="og:type" content="website" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple touch icons (fallback SVG data URIs until real icons generated) -->
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>FlatShare — Shared Living, Clear Bills</title>

    <style>
      /* Prevent flash of unstyled content */
      html { background-color: #0a0a0f; }
      /* Safe area for notched phones */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
